{% extends 'attendance/base.html' %}
{% block content %}
<div class="container mt-5 text-center">
    <h3>Are you sure you want to delete <strong>{{ teacher.get_full_name }}</strong>?</h3>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger mt-3">Yes, Delete</button>
        <a href="{% url 'list_teachers' %}" class="btn btn-secondary mt-3">Cancel</a>
    </form>
</div>
{% endblock %}
