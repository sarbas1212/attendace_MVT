{% extends 'attendance/base.html' %}

{% block content %}

    #sidebar, .sidebar, .topbar { display: none !important; }
    .main-content { margin-left: 0 !important; width: 100% !important; min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #fff; }
</style>

<div class="text-center p-5">
    <div class="mb-4">
        <i class="bi bi-shield-lock-fill text-danger" style="font-size: 5rem;"></i>

        <a href="javascript:history.back()" class="btn btn-outline-secondary px-4 me-2">Go Back</a>
