{% extends 'attendance/base.html' %}
{% block content %}
<style>
    #sidebar, .sidebar, .topbar, .sidebar-overlay { display: none !important; }
    .main-content {
        margin-left: 0 !important; width: 100% !important; min-height: 100vh !important;
        background-color: #f0f2f5 !important; display: flex !important;
        align-items: center !important; justify-content: center !important; padding: 20px !important;
    }
    .content-area { max-width: 500px; width: 100%; }
    .reset-card { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background: #fff; }

    /* Fix Django's internal form rendering */
    form p { margin-bottom: 1.5rem; }
    form label { display: block; font-weight: 600; font-size: 0.85rem; color: #6c757d; margin-bottom: 5px; }
    form input { 
        display: block; width: 100%; padding: 12px 15px; border-radius: 10px; 
        border: 1px solid #dee2e6; background-color: #f8f9fa; font-size: 0.95rem;
    }
    form input:focus { border-color: #0d6efd; outline: none; box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1); }
    .helptext { display: block; font-size: 0.75rem; color: #adb5bd; margin-top: 5px; line-height: 1.3; }
    .errorlist { list-style: none; padding: 0; color: #dc3545; font-size: 0.8rem; margin-top: 5px; font-weight: 500; }
</style>

<div class="content-area">
    <div class="card reset-card overflow-hidden">
        <div class="text-center py-5 bg-primary text-white">
            <i class="bi bi-key-fill" style="font-size: 3rem;"></i>
            <h4 class="fw-bold mt-2">New Password</h4>
        </div>
        <div class="card-body p-4 p-md-5">
            {% if validlink %}
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold py-3 mt-2 shadow" style="border-radius: 12px;">
                    Update Password
                </button>
            </form>
            {% else %}
            <div class="text-center py-4">
                <i class="bi bi-exclamation-triangle text-warning" style="font-size: 3.5rem;"></i>
                <h5 class="fw-bold mt-3">Link Expired</h5>
                <p class="text-muted small">This password reset link is no longer valid.</p>
                <a href="{% url 'password_reset' %}" class="btn btn-primary px-4 py-2 mt-2 fw-bold" style="border-radius: 10px;">Request New Link</a>
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
