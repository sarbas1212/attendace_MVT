{% extends 'attendance/base.html' %}
{% block content %}
<style>
    #sidebar, .sidebar, .topbar { display: none !important; }
    .main-content {
        margin-left: 0 !important; width: 100% !important; min-height: 100vh !important;
        background-color: #f0f2f5 !important; display: flex !important;
        align-items: center !important; justify-content: center !important;
    }
</style>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg text-center p-5" style="border-radius: 20px;">
                <div class="bg-success bg-opacity-10 rounded-circle mx-auto d-flex align-items-center justify-content-center mb-4" style="width: 100px; height: 100px;">
                    <i class="bi bi-envelope-check text-success" style="font-size: 3rem;"></i>
                </div>
                <h4 class="fw-bold">Check Your Email</h4>
                <p class="text-muted px-3">We've sent password reset instructions to your email address. If you don't receive it within a few minutes, check your spam folder.</p>
                <a href="{% url 'login' %}" class="btn btn-primary w-100 fw-bold py-3 mt-3 shadow-sm" style="border-radius: 12px;">
                    Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
