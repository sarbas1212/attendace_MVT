{% extends 'attendance/base.html' %}

{% block content %}
<style>
    #sidebar, .sidebar, .topbar { display: none !important; }
    .main-content { margin-left: 0 !important; width: 100% !important; display: flex; align-items: center; min-height: 100vh; }
</style>

<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg p-4">
                <div class="card-body">
                    <i class="bi bi-x-circle-fill text-danger" style="font-size: 4rem;"></i>
                    <h3 class="fw-bold mt-3">Activation Link Invalid</h3>
                    <p class="text-muted">The activation link is either expired or has already been used. Please check your email or contact support.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary mt-3">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
