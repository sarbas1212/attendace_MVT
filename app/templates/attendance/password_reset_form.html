{% extends 'attendance/base.html' %}

{% block title %}Reset Password — Attendance Pro{% endblock %}

{% block content %}
<style>
    /* Absolute reset of the dashboard layout */
    #sidebar, .sidebar, .topbar, .sidebar-overlay, .sidebar-toggle { display: none !important; }
    
    .main-content {
        margin-left: 0 !important;
        width: 100% !important;
        min-height: 100vh !important;
        background-color: #f0f2f5 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        padding: 20px !important;
    }

    .content-area {
        padding: 0 !important;
        margin: 0 !important;
        width: 100%;
        max-width: 450px; /* Standard professional card width */
    }

    .reset-card {
        border: none;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        background: #fff;
        overflow: hidden;
    }

    .reset-header {
        background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
        padding: 40px 30px;
        color: white;
        text-align: center;
    }

    .reset-header i { font-size: 3.5rem; }

    .form-control-lg {
        border-radius: 12px;
        font-size: 1rem;
        padding: 12px 15px;
        border: 1px solid #dee2e6;
        background-color: #f8f9fa;
    }

    .btn-reset {
        padding: 14px;
        border-radius: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
</style>

<div class="content-area">
    <div class="card reset-card">
        <div class="reset-header">
            <i class="bi bi-shield-lock-fill mb-3 d-block"></i>
            <h3 class="fw-bold mb-1">Reset Password</h3>
            <p class="mb-0 small opacity-75">Enter your email to secure your account</p>
        </div>
        
        <div class="card-body p-4 p-md-5">
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted uppercase">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0" style="border-radius: 12px 0 0 12px;"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control form-control-lg border-start-0" placeholder="name@company.com" required autofocus>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-reset w-100 shadow-sm">
                    Send Reset Instructions
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="{% url 'login' %}" class="text-decoration-none small fw-bold text-primary">
                    <i class="bi bi-arrow-left me-1"></i> Back to Sign In
                </a>
            </div>
        </div>
    </div>
    <p class="text-center text-muted mt-4 small">&copy; 2026 Attendance Pro</p>
</div>
{% endblock %}
