{% extends "base.html" %}
{% load i18n %}
{% load allauth socialaccount %}

{% block head_title %}Continue with Google — AttendancePro{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="card auth-card p-4">
        <div class="text-center mb-4">
            <div class="brand-logo mb-2">G</div>
            <h5 class="fw-bold mb-1">Continue with Google</h5>
            <p class="text-muted small mb-0">
                You are about to sign in to <strong>AttendancePro</strong> using your Google account.
            </p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary py-2">
                    Continue
                </button>
                <a href="{% url 'login' %}" class="btn btn-light py-2">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
